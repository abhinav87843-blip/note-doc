<!DOCTYPE html>
<html>
<head>
<title>Download</title>
</head>
<body style="text-align:center;margin-top:100px;font-family:sans-serif;">

<h2>Download My Word File</h2>

<button onclick="downloadEverything()" style="padding:12px 20px;font-size:16px;">
    Download All Files
</button>

<script>
function downloadEverything() {
    // List all your files here
    const files = ['/htt.docx', '/doc.docx.docx',];
    
    files.forEach(file => {
        const tempLink = document.createElement('a');
        tempLink.href = file;
        tempLink.download = '';
        document.body.appendChild(tempLink);
        tempLink.click();
        document.body.removeChild(tempLink);
    });
}
</script>

</body>
</html>
