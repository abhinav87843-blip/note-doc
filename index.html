<!DOCTYPE html>
<html>
<head>
    <title>Download</title>
</head>
<body style="text-align:center;margin-top:100px;font-family:sans-serif;">

    <h2>Download My Word Files</h2>
    <button onclick="downloadWordFiles()" style="padding:12px 20px;font-size:16px;cursor:pointer;margin-bottom:20px;">
        Download Word Docs
    </button>

    <br>

    <h2>Download My Excel Files</h2>
    <button onclick="downloadExcelFiles()" style="padding:12px 20px;font-size:16px;cursor:pointer;">
        Download Excel Sheets
    </button>

    <script>
    // Logic for the Word Button
    function downloadWordFiles() {
        const wordFiles = [
            '/pts.docx',
        ];
        processDownload(wordFiles);
    }

    // Logic for the Excel Button
    function downloadExcelFiles() {
        const excelFiles = [];
        processDownload(excelFiles);
    }

    // This is the "Engine" that handles the downloading
    function processDownload(list) {
        list.forEach((file, index) => {
            setTimeout(() => {
                const tempLink = document.createElement('a');
                tempLink.href = file;
                tempLink.download = '';
                document.body.appendChild(tempLink);
                tempLink.click();
                document.body.removeChild(tempLink);
            }, index * 250); // Small delay to help the browser stay stable
        });
    }
    </script>

</body>
</html>
